<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inicializar app</title>
  <style>
    body{font-family:Inter,Arial,sans-serif;background:#0b1020;color:#fff;margin:0;padding:32px}
    .box{max-width:560px;margin:auto;background:#121a30;border:1px solid #253054;border-radius:18px;padding:24px}
    input{width:100%;padding:12px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#fff;margin:8px 0 14px}
    button{padding:12px 18px;border:none;border-radius:10px;background:#7c5cff;color:#fff;font-weight:700;cursor:pointer}
    .muted{color:#94a3b8;font-size:14px}
    label{display:block;margin-top:8px}
  </style>
</head>
<body>
  <div class="box">
    <h1>Inicialización de la app</h1>
    <p class="muted">Usa esta página una sola vez, después de ejecutar el SQL en Supabase.</p>
    <label>SETUP_SECRET</label>
    <input id="secret" placeholder="El valor que pusiste en Vercel" />
    <label>Nombre del administrador</label>
    <input id="name" placeholder="Administrador" />
    <label>Email del administrador</label>
    <input id="email" placeholder="admin@tuempresa.com" />
    <label>Contraseña del administrador</label>
    <input id="password" type="password" placeholder="Mínimo 8 caracteres" />
    <label><input id="demo" type="checkbox" checked /> Crear usuarios demo y datos base</label>
    <div style="margin-top:18px"><button onclick="runSetup()">Inicializar</button></div>
    <pre id="out" class="muted"></pre>
  </div>
  <script>
    async function runSetup(){
      const payload = {
        setup_secret: document.getElementById('secret').value.trim(),
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        create_demo: document.getElementById('demo').checked
      };
      const r = await fetch('/api/setup', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
      const data = await r.json();
      document.getElementById('out').textContent = JSON.stringify(data, null, 2);
      if (data.ok) alert('Listo. Ya podés entrar a la app.');
    }
  </script>
</body>
</html>
